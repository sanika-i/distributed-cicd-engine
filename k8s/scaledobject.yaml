apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka-kafka-bootstrap.default.svc.cluster.local:9092
        consumerGroup: worker-group
        topic: jobs
        lagThreshold: "1"
        offsetResetPolicy: latest