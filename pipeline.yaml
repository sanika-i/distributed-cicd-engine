version: 1

stages:
  - build
  - test
  - deploy

jobs:
  install_deps:
    stage: build
    image: node:18
    commands:
      - echo "Installing dependencies..."
      - node -v
      - npm -v

  compile:
    stage: build
    image: node:18
    commands:
      - echo "Compiling..."
      - echo "Build complete!"

  lint:
    stage: test
    image: node:18
    commands:
      - echo "Running lint..."
      - echo "Lint passed!"

  unit_tests:
    stage: test
    image: node:18
    commands:
      - echo "Running unit tests..."
      - echo "All tests passed!"

  type_check:
    stage: test
    image: node:18
    commands:
      - echo "Running type check..."
      - echo "Type check passed!"

  deploy_k8s:
    stage: deploy
    image: node:18
    commands:
      - echo "Deploying..."
      - echo "Deploy complete!"